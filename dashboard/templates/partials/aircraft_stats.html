<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 shadow-lg">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Viable routes</p>
        <p class="text-2xl font-bold font-mono text-gray-100">{{ agg.viable_routes or 0 }}</p>
    </div>
    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 shadow-lg">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Avg profit / day</p>
        <p class="text-2xl font-bold font-mono text-emerald-400">${{ "{:,.0f}".format(agg.avg_profit or 0) }}</p>
    </div>
    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 shadow-lg">
        <p class="text-gray-400 text-xs uppercase tracking-wider">Best hub (max profit)</p>
        <p class="text-2xl font-bold font-mono text-emerald-300">{{ best_hub }}</p>
    </div>
</div>
